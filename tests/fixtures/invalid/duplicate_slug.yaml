# both services share monitor_slug `shared-cron` -> uniqueness violation
services:
  - id: web-api
    git_url: https://github.com/example-org/web-api
    default_branch: main
    host: host-1
    deploy_dir: /srv/automation/web-api
    port: 8001
    glitchtip_project: web-api
    sentry_dsn_secret: SENTRY_DSN_OPS_DISPATCHER
    monitor_slug: shared-cron
    tier: prod
    rollback_safety: safe
  - id: digest-worker
    git_url: https://github.com/example-org/digest-worker
    default_branch: main
    host: host-1
    deploy_dir: /srv/media/digest-worker
    port: 8080
    glitchtip_project: digest-worker
    sentry_dsn_secret: SENTRY_DSN_KEY_PROXY
    monitor_slug: shared-cron
    tier: prod
    rollback_safety: safe
