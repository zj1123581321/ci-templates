# Reusable build + deploy pipeline for the 50+ service舰队 (D3).
#
# Callers pin @v1 (NOT @main). A canary repo rides @main; once green we move the
# v1 tag, so a single bad commit can't fan out to all 50 deploys at once.
#
# SECURITY (A4 / codex#5): secrets are declared EXPLICITLY — no `secrets: inherit`.
# This workflow can only ever see the 6 secrets below, nothing else in the org.
name: build-deploy

on:
  workflow_call:
    inputs:
      image_name:
        description: "ACR image name == registry service id"
        required: true
        type: string
      host:
        description: "Tailscale-reachable address (IP or MagicDNS name) of the deploy target; also the concurrency key. NOT a ~/.ssh/config alias (runner has no config)."
        required: true
        type: string
      ssh_user:
        description: "SSH user on the deploy target host"
        required: false
        default: "zlx"
        type: string
      deploy_dir:
        description: "Absolute path on the host holding the compose file"
        required: true
        type: string
      acr_registry:
        description: "ACR registry host"
        required: false
        default: "crpi-0vsre5argteykh9m.cn-guangzhou.personal.cr.aliyuncs.com"
        type: string
      acr_namespace:
        description: "ACR namespace"
        required: false
        default: "zlx-personal"
        type: string
      build_context:
        required: false
        default: "."
        type: string
      dockerfile:
        required: false
        default: "Dockerfile"
        type: string
      healthcheck_url:
        description: "Post-deploy health probe URL; empty disables the gate"
        required: false
        default: ""
        type: string
      healthcheck_expect_status:
        required: false
        default: "200"
        type: string
      healthcheck_retries:
        required: false
        default: "5"
        type: string
      healthcheck_interval:
        required: false
        default: "3"
        type: string
      healthcheck_warmup:
        required: false
        default: "10"
        type: string
      busy_lock_file:
        description: "opt-in deploy gate: path to a service-held flock busy lock (e.g. <deploy_dir>/.deploy-state/busy.lock). Empty (default) disables the gate — behavior unchanged."
        required: false
        default: ""
        type: string
      busy_lock_timeout:
        required: false
        default: "600"
        type: string
      ci_templates_ref:
        description: "Ref of ci-templates to fetch the deploy scripts from"
        required: false
        default: "v1"
        type: string
    # EXPLICIT secrets only — least privilege. Do NOT add `inherit`.
    secrets:
      ACR_USERNAME:
        required: true
      ACR_PASSWORD:
        required: true
      SSH_DEPLOY_KEY:
        required: true
      KNOWN_HOSTS:
        required: true
      TS_AUTHKEY:
        required: true
      CI_TEMPLATES_PAT:
        required: true

# Callers cannot gain more privilege through this reusable workflow. The job
# only needs repository contents to check out the caller repository.
permissions:
  contents: read

# Per-host concurrency: GitHub-side serialization, paired with SSH flock on the
# host. A new deploy to the same host waits rather than racing.
concurrency:
  group: deploy-${{ inputs.host }}
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout caller repo
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Checkout ci-templates (deploy scripts)
        # ci-templates 是 private 仓,默认 GITHUB_TOKEN 读不了 → 用只读 PAT
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: zj1123581321/ci-templates
          ref: ${{ inputs.ci_templates_ref }}
          token: ${{ secrets.CI_TEMPLATES_PAT }}
          path: .ci-templates

      - name: Resolve git SHA (immutable tag)
        id: sha
        run: echo "git_sha=${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Log in to ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login \
            "${{ inputs.acr_registry }}" \
            -u "${{ secrets.ACR_USERNAME }}" --password-stdin

      - name: Build & push immutable image
        env:
          ACR_REGISTRY: ${{ inputs.acr_registry }}
          ACR_NAMESPACE: ${{ inputs.acr_namespace }}
          IMAGE_NAME: ${{ inputs.image_name }}
          GIT_SHA: ${{ steps.sha.outputs.git_sha }}
          BUILD_CONTEXT: ${{ inputs.build_context }}
          DOCKERFILE: ${{ inputs.dockerfile }}
        run: bash .ci-templates/scripts/push_to_acr.sh

      - name: Connect to Tailscale
        # runner 临时入 tailnet(ephemeral 节点,job 结束自动下线),才能 SSH 到内网 100.x 目标机
        uses: tailscale/github-action@4e4c49acaa9818630ce0bd7a564372c17e33fb4d # v2
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_DEPLOY_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          echo "${{ secrets.KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Deploy over SSH (flock + health probe + auto-rollback)
        id: deploy
        env:
          ACR_REGISTRY: ${{ inputs.acr_registry }}
          ACR_NAMESPACE: ${{ inputs.acr_namespace }}
          IMAGE_NAME: ${{ inputs.image_name }}
          GIT_SHA: ${{ steps.sha.outputs.git_sha }}
          DEPLOY_HOST: ${{ inputs.host }}
          SSH_USER: ${{ inputs.ssh_user }}
          DEPLOY_DIR: ${{ inputs.deploy_dir }}
          HEALTHCHECK_URL: ${{ inputs.healthcheck_url }}
          HEALTHCHECK_EXPECT_STATUS: ${{ inputs.healthcheck_expect_status }}
          HEALTHCHECK_RETRIES: ${{ inputs.healthcheck_retries }}
          HEALTHCHECK_INTERVAL: ${{ inputs.healthcheck_interval }}
          HEALTHCHECK_WARMUP: ${{ inputs.healthcheck_warmup }}
          BUSY_LOCK_FILE: ${{ inputs.busy_lock_file }}
          BUSY_LOCK_TIMEOUT: ${{ inputs.busy_lock_timeout }}
        run: |
          ACR_IMAGE="${ACR_REGISTRY}/${ACR_NAMESPACE}/${IMAGE_NAME}"
          # keepalive 防 tailnet 上偶发的 `Connection reset ...:22`(canary 遇过,50 服务规模会常遇):
          # 15s 探一次,连丢 4 次(~60s)才判死;连接阶段也给 ConnectTimeout 兜底。
          SSH_OPTS="-i $HOME/.ssh/id_deploy \
            -o ServerAliveInterval=15 -o ServerAliveCountMax=4 -o ConnectTimeout=20"

          # 退出码语义(决定能不能重试):
          #   0   = 部署健康
          #   255 = SSH/scp 传输层失败(Connection reset / timeout)→ 瞬时,安全重试
          #   1   = pull_and_deploy.sh 主动失败(探针挂,且已在 host 端自动回滚)
          #         → 真实坏部署,绝不重试(否则重拉/重部/重滚 3 遍,搅乱生产)
          #   3   = deferred:busy-lock 门禁(opt-in)超时未等到,服务忙,旧容器保留
          #         → 不是故障,不重试;写 deferred=true 分流去黄卡,等空闲手动 re-run
          # scp 只是拷个脚本文件(无副作用),失败一律归到 255 当瞬时重试;
          # ssh 透传远端脚本的退出码,1 与 255 在此被区分对待。
          deploy_once() {
            scp $SSH_OPTS .ci-templates/scripts/pull_and_deploy.sh \
              "${SSH_USER}@${DEPLOY_HOST}:/tmp/pull_and_deploy.sh" || return 255
            ssh $SSH_OPTS "${SSH_USER}@${DEPLOY_HOST}" \
              "IMAGE_NAME='${IMAGE_NAME}' ACR_IMAGE='${ACR_IMAGE}' \
               GIT_SHA='${GIT_SHA}' DEPLOY_DIR='${DEPLOY_DIR}' \
               HOST_LOCK='/var/lock/fleet-deploy.lock' \
               HEALTHCHECK_URL='${HEALTHCHECK_URL}' \
               HEALTHCHECK_EXPECT_STATUS='${HEALTHCHECK_EXPECT_STATUS}' \
               HEALTHCHECK_RETRIES='${HEALTHCHECK_RETRIES}' \
               HEALTHCHECK_INTERVAL='${HEALTHCHECK_INTERVAL}' \
               HEALTHCHECK_WARMUP='${HEALTHCHECK_WARMUP}' \
               BUSY_LOCK_FILE='${BUSY_LOCK_FILE}' \
               BUSY_LOCK_TIMEOUT='${BUSY_LOCK_TIMEOUT}' \
               bash /tmp/pull_and_deploy.sh"
          }

          attempt=1; max_attempts=3
          while true; do
            rc=0; deploy_once || rc=$?
            if [ "$rc" -eq 0 ]; then
              echo "::notice::deploy ok (attempt ${attempt}/${max_attempts})"
              break
            fi
            if [ "$rc" -eq 3 ]; then
              # deferred:busy-lock 门禁(opt-in)超时未等到,服务忙,旧容器保留。
              # 顺序很重要:必须先于下面 "!= 255" 的判断拦截,否则会被误判为
              # "已按探针门自动回滚" 报错退出,语义就错了(那是给探针失败用的)。
              echo "deferred=true" >> "$GITHUB_OUTPUT"
              echo "::warning::deploy DEFERRED — service busy, old container kept. Image ${GIT_SHA} is already in ACR; re-run this workflow when the service is idle."
              exit 3
            fi
            if [ "$rc" -ne 255 ]; then
              # 脚本主动失败(已回滚)—— 真实问题,立即上报,不重试
              echo "::error::deploy failed (rc=${rc}); host 已按探针门自动回滚,不重试"
              exit "$rc"
            fi
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "::error::SSH transport failed after ${max_attempts} attempts (rc=255)"
              exit 1
            fi
            echo "::warning::SSH transport hiccup (rc=255) attempt ${attempt}/${max_attempts}, retrying in 10s"
            attempt=$((attempt + 1))
            sleep 10
          done

      # ── 通知层(Phase 1 / Approach A)──────────────────────────────────────────
      # 补上本仓此前完全缺失的 notify:部署失败(build / ACR push / tailscale / SSH / 探针失败+
      # 自动回滚,任一)→ P0 飞书红卡 + @全员唤醒。此前生产回滚只靠 GitHub 邮件冒泡,是最大缺口。
      # fail-open(if:failure + continue-on-error + 吞异常):通知挂了绝不影响部署/回滚结论。
      # 凭据 = 调用方服务仓的 repo 变量 vars.FEISHU_CI_WEBHOOK(关键词模式,无 secret);
      # 标题关键词 = vars.FEISHU_CI_TITLE_PREFIX。未配置时默认 [zlxlabs·CI],兼容 Phase 1 仓库。
      - name: Feishu 部署失败卡 (P0, fail-open)
        if: failure() && steps.deploy.outputs.deferred != 'true'
        continue-on-error: true
        env:
          FEISHU_WEBHOOK: ${{ vars.FEISHU_CI_WEBHOOK }}
          FEISHU_TITLE_PREFIX: ${{ vars.FEISHU_CI_TITLE_PREFIX }}
          SVC:     ${{ inputs.image_name }}
          HOST:    ${{ inputs.host }}
          REPO:    ${{ github.repository }}
          SHA:     ${{ steps.sha.outputs.git_sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 - <<'PY'
          import json, os, urllib.request
          hook = os.environ.get("FEISHU_WEBHOOK", "").strip()
          if not hook:
              print("no FEISHU_CI_WEBHOOK var set — skip notify"); raise SystemExit(0)
          title_prefix = os.environ.get("FEISHU_TITLE_PREFIX", "").strip() or "[zlxlabs·CI]"
          svc     = os.environ.get("SVC", "") or "?"
          host    = os.environ.get("HOST", "") or "?"
          repo    = os.environ["REPO"]
          sha     = os.environ.get("SHA", "") or "?"
          run_url = os.environ["RUN_URL"]
          # 关键词模式:机器人关键词由标题前缀保证命中,与 repo 路径解耦
          # (2026-07-08 canary 抓到:非 zlxlabs 仓靠 repo 路径会静默丢卡 code:19024)。<at id=all> 唤醒本群。
          body = (f"**服务** `{svc}`  ·  **目标机** `{host}`\n"
                  f"**仓库** `{repo}`  ·  **SHA** `{sha}`\n"
                  f"部署失败(build / ACR / SSH / 探针 其一)。若为探针失败,host 端已按探针门"
                  f"**自动回滚到 last_good**,生产不受影响;否则本次未上线。点按钮看详情。\n"
                  f"<at id=all></at>")
          card = {
              "msg_type": "interactive",
              "card": {
                  "config": {"wide_screen_mode": True},
                  "header": {"template": "red",
                             "title": {"tag": "plain_text", "content": f"🔴 {title_prefix} P0 部署失败 · {svc}"}},
                  "elements": [
                      {"tag": "div", "text": {"tag": "lark_md", "content": body}},
                      {"tag": "action", "actions": [
                          {"tag": "button", "text": {"tag": "plain_text", "content": "查看部署 Run"},
                           "type": "primary", "url": run_url},
                      ]},
                  ],
              },
          }
          req = urllib.request.Request(
              hook, data=json.dumps(card).encode(), headers={"Content-Type": "application/json"})
          try:
              with urllib.request.urlopen(req, timeout=10) as r:
                  print("feishu resp:", r.status, r.read(300).decode("utf-8", "replace"))
          except Exception as e:
              print("feishu notify failed (swallowed):", e)
          PY

      # deferred(rc=3):busy-lock 门禁(opt-in)超时未等到,服务忙,不是故障。
      # job 仍标红(诚实反映"新 SHA 未上线"),但通知分流成黄卡:不 @全员,
      # 语义是"正常延期,构建已在库,空闲后点按钮 re-run"——与红卡的"真实故障"分开。
      - name: Feishu 部署延期卡 (deferred, fail-open)
        if: failure() && steps.deploy.outputs.deferred == 'true'
        continue-on-error: true
        env:
          FEISHU_WEBHOOK: ${{ vars.FEISHU_CI_WEBHOOK }}
          FEISHU_TITLE_PREFIX: ${{ vars.FEISHU_CI_TITLE_PREFIX }}
          SVC:     ${{ inputs.image_name }}
          HOST:    ${{ inputs.host }}
          REPO:    ${{ github.repository }}
          SHA:     ${{ steps.sha.outputs.git_sha }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          python3 - <<'PY'
          import json, os, urllib.request
          hook = os.environ.get("FEISHU_WEBHOOK", "").strip()
          if not hook:
              print("no FEISHU_CI_WEBHOOK var set — skip notify"); raise SystemExit(0)
          title_prefix = os.environ.get("FEISHU_TITLE_PREFIX", "").strip() or "[zlxlabs·CI]"
          svc     = os.environ.get("SVC", "") or "?"
          host    = os.environ.get("HOST", "") or "?"
          repo    = os.environ["REPO"]
          sha     = os.environ.get("SHA", "") or "?"
          run_url = os.environ["RUN_URL"]
          # 黄卡:不 @全员——这是正常延期,不是故障,不该打扰全群。
          body = (f"**服务** `{svc}`  ·  **目标机** `{host}`\n"
                  f"**仓库** `{repo}`  ·  **SHA** `{sha}`\n"
                  f"服务忙(长任务进行中),本次**部署延期,未替换**——旧版本继续运行,生产不受影响。\n"
                  f"镜像 `{sha}` 已构建并推送 ACR,无需重新 build;空闲后点按钮 **重跑部署**即可上线。")
          card = {
              "msg_type": "interactive",
              "card": {
                  "config": {"wide_screen_mode": True},
                  "header": {"template": "yellow",
                             "title": {"tag": "plain_text", "content": f"⏸️ {title_prefix} 部署延期 · {svc}"}},
                  "elements": [
                      {"tag": "div", "text": {"tag": "lark_md", "content": body}},
                      {"tag": "action", "actions": [
                          {"tag": "button", "text": {"tag": "plain_text", "content": "重跑部署"},
                           "type": "primary", "url": run_url},
                      ]},
                  ],
              },
          }
          req = urllib.request.Request(
              hook, data=json.dumps(card).encode(), headers={"Content-Type": "application/json"})
          try:
              with urllib.request.urlopen(req, timeout=10) as r:
                  print("feishu resp:", r.status, r.read(300).decode("utf-8", "replace"))
          except Exception as e:
              print("feishu notify failed (swallowed):", e)
          PY
